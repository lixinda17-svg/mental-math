<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Mental Math" />
  <title>Mental Math</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      text-align: center;
      padding: 40px 20px;
      background: #f7f7f7;
    }

    .card {
      max-width: 420px;
      margin: auto;
      background: white;
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 30px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 18px;
      color: #666;
      margin-bottom: 20px;
    }

    #question {
      font-size: 58px;
      margin: 30px 0;
      font-weight: bold;
    }

    input {
      font-size: 34px;
      width: 180px;
      text-align: center;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid #ccc;
    }

    button {
      font-size: 24px;
      padding: 14px 32px;
      margin-top: 20px;
      border: none;
      border-radius: 16px;
      background: #007aff;
      color: white;
    }

    button:active {
      background: #005ecb;
    }

    #feedback {
      font-size: 28px;
      margin-top: 24px;
      min-height: 40px;
    }

    #score {
      font-size: 20px;
      color: #555;
      margin-top: 24px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Mental Math</h1>
    <div class="subtitle">Two-Digit Addition and Subtraction</div>

    <div id="question"></div>

    <input id="answer" type="number" inputmode="numeric" placeholder="Answer" />
    <br />

    <button onclick="checkAnswer()">Submit</button>

    <div id="feedback"></div>
    <div id="score">Correct: 0　Wrong: 0</div>
  </div>

  <script>
    let a, b, op, correctAnswer;
    let right = 0;
    let wrong = 0;
    let locked = false;

    function randomTwoDigitNumber() {
      return Math.floor(Math.random() * 90) + 10;
    }

    function newQuestion() {
      locked = false;

      do {
        a = randomTwoDigitNumber();
        b = randomTwoDigitNumber();
        op = Math.random() < 0.5 ? "+" : "-";

        if (op === "-" && a < b) {
          [a, b] = [b, a]; // Avoid negative answers
        }

        correctAnswer = op === "+" ? a + b : a - b;

      } while (correctAnswer < 0 || correctAnswer > 100);

      document.getElementById("question").textContent = `${a} ${op} ${b} = ?`;
      document.getElementById("answer").value = "";
      document.getElementById("feedback").textContent = "";
      document.getElementById("answer").focus();
    }

    function checkAnswer() {
      if (locked) return;

      const answerInput = document.getElementById("answer");
      const userAnswer = Number(answerInput.value);

      if (answerInput.value === "") {
        document.getElementById("feedback").textContent = "Please enter an answer";
        return;
      }

      locked = true;

      if (userAnswer === correctAnswer) {
        right++;
        document.getElementById("feedback").textContent = "✅ Correct!";
      } else {
        wrong++;
        document.getElementById("feedback").textContent = `❌ Wrong. The correct answer is ${correctAnswer}`;
      }

      document.getElementById("score").textContent = `Correct: ${right}　Wrong: ${wrong}`;

      setTimeout(newQuestion, 1000);
    }

    document.getElementById("answer").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        checkAnswer();
      }
    });

    newQuestion();
  </script>
</body>
</html>
